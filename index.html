<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Formatter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b0e;--bg2:#111318;--bg3:#181b22;--bg4:#1e2229;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.13);
  --text:#ffffff;--text2:#fff700;--text3:#777777;
  --green:#4ade80;--green-bg:rgba(74,222,128,0.08);--green-br:rgba(74,222,128,0.2);
  --red:#f87171;--red-bg:rgba(248,113,113,0.08);--red-br:rgba(248,113,113,0.2);
  --gold:#fbbf24;--gold-bg:rgba(251,191,36,0.07);--gold-br:rgba(251,191,36,0.18);
  --violet:#a78bfa;--violet-bg:rgba(167,139,250,0.08);--violet-br:rgba(167,139,250,0.2);
  --blue:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:44px 16px 72px;
}
body::before{
  content:'';position:fixed;top:-180px;left:50%;transform:translateX(-50%);
  width:700px;height:500px;
  background:radial-gradient(ellipse,rgba(74,222,128,0.035) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}
.app{width:100%;max-width:500px;position:relative;z-index:1}

/* Header */
.hdr{text-align:center;margin-bottom:40px}
.hdr-logo{display:inline-flex;align-items:center;gap:11px;margin-bottom:10px}
.hdr-icon{
  width:38px;height:38px;background:var(--green-bg);
  border:1px solid var(--green-br);border-radius:11px;
  display:flex;align-items:center;justify-content:center;
}
.hdr h1{font-size:21px;font-weight:600;letter-spacing:-0.4px}
.hdr p{font-size:13px;color:var(--text3);line-height:1.6}

/* Card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:22px 22px 24px;margin-bottom:10px}
.card-label{font-size:10.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);margin-bottom:18px}

/* Field */
.field{flex:1}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:7px;font-weight:500}
.field input{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'DM Mono',monospace;font-size:15px;font-weight:500;
  padding:11px 14px;outline:none;transition:border-color .18s,background .18s;
  -moz-appearance:textfield;
}
.field input::-webkit-inner-spin-button{-webkit-appearance:none}
.field input::placeholder{color:var(--text3);font-weight:400}
.field input:hover{border-color:var(--border-h)}
.field input:focus{border-color:rgba(255,255,255,.2);background:var(--bg4)}

.row{display:flex;gap:10px;margin-bottom:10px}
.row:last-child{margin-bottom:0}

/* Direction toggle */
.dir-wrap{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:3px;gap:3px;flex:1}
.dir-btn{
  flex:1;padding:9px 0;border-radius:8px;border:none;background:transparent;
  color:var(--text3);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .18s;
}
.dir-btn.long.on{background:var(--green-bg);color:var(--green);box-shadow:inset 0 0 0 1px var(--green-br)}
.dir-btn.short.on{background:var(--red-bg);color:var(--red);box-shadow:inset 0 0 0 1px var(--red-br)}
.dir-btn:not(.on):hover{color:var(--text2)}

/* RR */
.rr-wrap{position:relative}
.rr-wrap input{padding-right:44px}
.rr-sfx{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  font-family:'DM Mono',monospace;font-size:11.5px;color:var(--text3);pointer-events:none;
}

/* Warn */
.warn{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--red);margin-top:10px;opacity:.85}

/* Risk pills */
.pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.pill{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);font-size:12px;color:var(--text2)}
.pill b{font-weight:500;font-family:'DM Mono',monospace}
.pill.g b{color:var(--green)}.pill.r b{color:var(--red)}.pill.a b{color:var(--gold)}
.pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5}

/* TP card header row */
.tp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.tp-header .card-label{margin-bottom:0}
.reset-all-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:7px;
  border:1px solid var(--border);background:transparent;
  color:var(--text3);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;
}
.reset-all-btn:hover{border-color:var(--border-h);color:var(--text2)}
.reset-all-btn.visible{display:flex}
.reset-all-btn.hidden{display:none}

/* TP empty */
.tp-empty{text-align:center;color:var(--text3);font-size:13px;padding:18px 0 6px}
.tp-list{display:flex;flex-direction:column;gap:7px}

/* TP item */
.tp-item{
  display:flex;align-items:center;
  padding:0;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:10px;
  transition:border-color .15s;
  animation:tp-in .22s ease both;
  overflow:hidden;
}
.tp-item.manual{border-color:var(--violet-br)}
.tp-item:not(.manual):hover{border-color:var(--gold-br)}
@keyframes tp-in{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* TP left section */
.tp-left{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;flex:1;min-width:0;
}
.tp-badge{
  width:27px;height:27px;flex-shrink:0;border-radius:7px;
  background:var(--gold-bg);border:1px solid var(--gold-br);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:var(--gold);
  transition:background .2s,border-color .2s,color .2s;
}
.tp-item.manual .tp-badge{background:var(--violet-bg);border-color:var(--violet-br);color:var(--violet)}

.tp-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
.tp-name{font-size:13px;color:var(--text2);white-space:nowrap}
.tp-sub{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.manual-tag{
  font-size:10px;font-weight:600;letter-spacing:.5px;
  color:var(--violet);background:var(--violet-bg);
  border:1px solid var(--violet-br);
  padding:1px 6px;border-radius:4px;
}

/* TP right section — display mode */
.tp-right{
  display:flex;align-items:center;gap:8px;
  padding:12px 6px 12px 0;
  flex-shrink:0;
}
.tp-price{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--gold);transition:color .2s}
.tp-item.manual .tp-price{color:var(--violet)}
.tp-rr{font-size:11px;color:var(--text3);background:var(--bg4);padding:2px 7px;border-radius:5px}

/* Edit button */
.tp-edit-btn{
  width:32px;height:32px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text3);
  transition:all .15s;flex-shrink:0;margin-right:10px;
}
.tp-edit-btn:hover{border-color:var(--border-h);color:var(--text2);background:var(--bg4)}
.tp-edit-btn.editing{
  border-color:var(--violet-br);color:var(--violet);
  background:var(--violet-bg);
}

/* TP input mode */
.tp-input-wrap{
  display:none;align-items:center;gap:6px;
  padding:8px 10px 8px 0;flex-shrink:0;
}
.tp-input-wrap.visible{display:flex}
.tp-manual-input{
  width:120px;
  background:var(--bg4);
  border:1px solid var(--violet-br);
  border-radius:8px;
  color:var(--violet);
  font-family:'DM Mono',monospace;
  font-size:14px;font-weight:500;
  padding:8px 10px;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
  -moz-appearance:textfield;
}
.tp-manual-input::-webkit-inner-spin-button{-webkit-appearance:none}
.tp-manual-input:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(167,139,250,0.1)}
.tp-reset-btn{
  width:28px;height:28px;border-radius:7px;
  border:1px solid var(--border);background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text3);
  transition:all .15s;flex-shrink:0;
}
.tp-reset-btn:hover{border-color:var(--red-br);color:var(--red);background:var(--red-bg)}

/* Separator between price and edit btn */
.tp-sep{width:1px;height:28px;background:var(--border);flex-shrink:0}

/* Description textarea */
.field textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;
  padding:11px 14px;outline:none;resize:vertical;min-height:80px;line-height:1.6;
  transition:border-color .18s,background .18s;
}
.field textarea::placeholder{color:var(--text3)}
.field textarea:hover{border-color:var(--border-h)}
.field textarea:focus{border-color:rgba(255,255,255,.2);background:var(--bg4)}

/* Preview */
.pv-shell{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.pv-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(--border)}
.pv-dots{display:flex;gap:5px}
.pv-dots span{width:7px;height:7px;border-radius:50%;background:var(--border-h)}
.pv-tag{font-size:10px;color:var(--text3);letter-spacing:.9px;text-transform:uppercase}
.pv-body{
  padding:16px 18px;font-family:'DM Mono',monospace;
  font-size:13px;line-height:1.9;white-space:pre;overflow-x:auto;
  color:var(--text2);min-height:72px;
}
.cg{color:var(--green)}.cr{color:var(--red)}.ca{color:var(--gold)}
.cm{color:var(--text3)}.cw{color:var(--text);font-weight:500}
.cv{color:var(--violet)}

/* Copy btn */
.copy{
  width:100%;padding:14px;border-radius:12px;
  border:1px solid var(--green-br);background:var(--green-bg);
  color:var(--green);font-family:'DM Sans',sans-serif;
  font-weight:600;font-size:14px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;
}
.copy:hover{background:rgba(74,222,128,.13);border-color:rgba(74,222,128,.32)}
.copy:active{transform:scale(.99)}
.copy.ok{background:rgba(74,222,128,.14)}

/* Toast */
.toast{
  position:fixed;bottom:32px;left:50%;
  transform:translateX(-50%) translateY(56px);
  background:#fff;color:#111;
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;
  padding:10px 22px;border-radius:100px;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .35s;
  opacity:0;z-index:999;display:flex;align-items:center;gap:8px;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.t-ck{
  width:17px;height:17px;border-radius:50%;background:#22c55e;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hdr-logo">
      <div class="hdr-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <polyline points="2,13 5.5,8 8.5,11 12,5 16,8" stroke="#4ade80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="8" r="1.5" fill="#4ade80"/>
        </svg>
      </div>
      <h1>Signal Formatter</h1>
    </div>
    <p>Isi posisi, sinyal langsung siap di-paste</p>
  </div>

  <!-- Input -->
  <div class="card">
    <div class="card-label">Detail Posisi</div>
    <div class="row">
      <div class="field" style="flex:1.4">
        <label>Pair</label>
        <input id="pair" type="text" placeholder="BTC/USDT" oninput="gen()" autocomplete="off"/>
      </div>
      <div class="field">
        <label>Arah</label>
        <div class="dir-wrap">
          <button class="dir-btn long on" id="bl" onclick="setDir('long')">↑ Long</button>
          <button class="dir-btn short" id="bs" onclick="setDir('short')">↓ Short</button>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Entry ($)</label>
        <input id="entry" type="number" placeholder="100" oninput="gen()"/>
      </div>
      <div class="field">
        <label>Stop Loss ($)</label>
        <input id="sl" type="number" placeholder="90" oninput="gen()"/>
      </div>
      <div class="field" style="flex:.65">
        <label>RR</label>
        <div class="rr-wrap">
          <input id="rr" type="number" value="2" min="1" max="20" oninput="gen()"/>
          <span class="rr-sfx">1:<span id="rrv">2</span></span>
        </div>
      </div>
    </div>
    <div class="row" style="margin-top:10px">
      <div class="field">
        <label>Deskripsi / Analisa</label>
        <textarea id="desc" placeholder="Contoh: BTC breakout dari resistance 100k, volume tinggi, momentum bullish. Entry di area demand zone..." oninput="gen()"></textarea>
      </div>
    </div>
    <div id="wa"></div>
  </div>

  <!-- TP -->
  <div class="card">
    <div class="tp-header">
      <div class="card-label" style="margin-bottom:0">Take Profit Targets</div>
      <button class="reset-all-btn hidden" id="reset-all-btn" onclick="resetAllManual()">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M1 6a5 5 0 105-5 5 5 0 00-4.9 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M1 2v4h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Reset semua ke auto
      </button>
    </div>
    <div id="pills" class="pills" style="display:none"></div>
    <div id="tpl" class="tp-list"><div class="tp-empty">Isi Entry & SL untuk melihat target TP</div></div>
  </div>

  <!-- Preview -->
  <div class="card">
    <div class="card-label">Preview Signal</div>
    <div class="pv-shell">
      <div class="pv-bar">
        <div class="pv-dots"><span></span><span></span><span></span></div>
        <span class="pv-tag">Output</span>
      </div>
      <div class="pv-body" id="pv"><span class="cm">Signal akan muncul di sini…</span></div>
    </div>
  </div>

  <button class="copy" id="copybtn" onclick="doCopy()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
      <path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span id="clbl">Salin Signal ke Clipboard</span>
  </button>

</div>

<div class="toast" id="toast">
  <div class="t-ck">
    <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
      <path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  Signal tersalin!
</div>

<script>
let D = 'long';
let PT = '';
// Stores manual overrides: { index: value } where value is number or null (auto)
let manualTP = {};
// Stores current auto values
let autoTP = [];
// Stores editing state
let editingIdx = new Set();

const PENCIL_SVG = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M9.5 1.5l2 2-8 8H1.5v-2l8-8z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const CLOSE_SVG  = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2L2 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`;
const RESET_SVG  = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6a5 5 0 105-5 5 5 0 00-4.9 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M1 2v4h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function setDir(d) {
  D = d;
  document.getElementById('bl').className = 'dir-btn long' + (d==='long' ? ' on' : '');
  document.getElementById('bs').className = 'dir-btn short' + (d==='short' ? ' on' : '');
  gen();
}

function fmt(n) {
  if (isNaN(n)) return '—';
  return parseFloat(n.toFixed(10)).toString();
}

function hasAnyManual() {
  return Object.values(manualTP).some(v => v !== null && v !== undefined && v !== '');
}

function gen() {
  const pair  = (document.getElementById('pair').value || '').trim().toUpperCase();
  const entry = parseFloat(document.getElementById('entry').value);
  const sl    = parseFloat(document.getElementById('sl').value);
  const rrRaw = parseFloat(document.getElementById('rr').value);
  const rr    = isNaN(rrRaw) || rrRaw < 1 ? 1 : Math.round(rrRaw);

  document.getElementById('rrv').textContent = rr;
  document.getElementById('wa').innerHTML = '';

  const tpl   = document.getElementById('tpl');
  const pv    = document.getElementById('pv');
  const pills = document.getElementById('pills');
  const resetAllBtn = document.getElementById('reset-all-btn');

  if (!pair || isNaN(entry) || isNaN(sl)) {
    tpl.innerHTML = '<div class="tp-empty">Isi Pair, Entry & SL untuk melihat target TP</div>';
    pv.innerHTML  = '<span class="cm">Signal akan muncul di sini…</span>';
    pills.style.display = 'none';
    resetAllBtn.className = 'reset-all-btn hidden';
    PT = ''; return;
  }

  const risk = Math.abs(entry - sl);
  if (risk === 0) {
    tpl.innerHTML = '<div class="tp-empty" style="color:var(--red)">Entry dan SL tidak boleh sama</div>';
    pills.style.display = 'none';
    resetAllBtn.className = 'reset-all-btn hidden';
    PT = ''; return;
  }

  const isL = D === 'long';
  if ((isL && sl >= entry) || (!isL && sl <= entry)) {
    document.getElementById('wa').innerHTML = `<div class="warn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 6v3M7 10.5h.01M6.134 2.5L1.5 10.5a1 1 0 00.866 1.5h9.268A1 1 0 0012.5 10.5L7.866 2.5a1 1 0 00-1.732 0z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>${isL ? 'Long: SL harus di bawah Entry' : 'Short: SL harus di atas Entry'}</div>`;
    tpl.innerHTML = '<div class="tp-empty">Periksa arah & nilai SL</div>';
    pills.style.display = 'none';
    resetAllBtn.className = 'reset-all-btn hidden';
    PT = ''; return;
  }

  // Compute auto TPs
  autoTP = [];
  for (let i = 1; i <= rr; i++) autoTP.push(isL ? entry + risk * i : entry - risk * i);

  // Clean up overrides for indices that no longer exist
  Object.keys(manualTP).forEach(k => { if (parseInt(k) >= rr) delete manualTP[k]; });
  editingIdx.forEach(k => { if (k >= rr) editingIdx.delete(k); });

  // Final TP values (auto or manual)
  const finalTPs = autoTP.map((v, i) => {
    const m = manualTP[i];
    return (m !== null && m !== undefined && m !== '' && !isNaN(parseFloat(m))) ? parseFloat(m) : v;
  });

  // Pills
  const pct = ((risk / entry) * 100).toFixed(2);
  pills.style.display = 'flex';
  pills.innerHTML = `
    <div class="pill ${isL?'g':'r'}"><div class="pill-dot"></div>Risk <b>$${fmt(risk)}</b></div>
    <div class="pill r"><div class="pill-dot"></div>SL <b>${pct}%</b> dari entry</div>
    <div class="pill a"><div class="pill-dot"></div>Target <b>${rr} TP</b></div>`;

  // Reset all button
  resetAllBtn.className = hasAnyManual() ? 'reset-all-btn visible' : 'reset-all-btn hidden';

  // Render TP rows
  tpl.innerHTML = autoTP.map((auto, i) => {
    const isManual  = manualTP[i] !== null && manualTP[i] !== undefined && manualTP[i] !== '' && !isNaN(parseFloat(manualTP[i]));
    const isEditing = editingIdx.has(i);
    const dispVal   = isManual ? parseFloat(manualTP[i]) : auto;
    const manualVal = manualTP[i] !== undefined && manualTP[i] !== null ? manualTP[i] : '';

    return `
    <div class="tp-item${isManual ? ' manual' : ''}" id="tpi-${i}">
      <div class="tp-left">
        <div class="tp-badge">${i+1}</div>
        <div class="tp-meta">
          <span class="tp-name">Take Profit ${i+1}</span>
          <div class="tp-sub">
            ${isManual
              ? `<span class="manual-tag">MANUAL</span>`
              : `<span style="color:var(--text3);font-size:11px">Auto · 1:${i+1}</span>`
            }
          </div>
        </div>
      </div>

      <!-- Display mode -->
      <div class="tp-right" id="tpr-${i}" style="${isEditing ? 'display:none' : ''}">
        <span class="tp-price">$${fmt(dispVal)}</span>
        <div class="tp-sep"></div>
        <button class="tp-edit-btn${isEditing ? ' editing' : ''}" onclick="toggleEdit(${i})" title="Edit manual">
          ${PENCIL_SVG}
        </button>
      </div>

      <!-- Edit mode -->
      <div class="tp-input-wrap${isEditing ? ' visible' : ''}" id="tpe-${i}">
        <input
          class="tp-manual-input"
          id="tpm-${i}"
          type="number"
          placeholder="${fmt(auto)}"
          value="${manualVal}"
          oninput="onManualInput(${i})"
          onkeydown="onManualKey(event, ${i})"
        />
        <button class="tp-reset-btn" onclick="resetManual(${i})" title="Reset ke auto">${RESET_SVG}</button>
        <button class="tp-edit-btn editing" onclick="toggleEdit(${i})" title="Selesai">${CLOSE_SVG}</button>
      </div>
    </div>`;
  }).join('');

  // Focus input if editing
  editingIdx.forEach(i => {
    const inp = document.getElementById('tpm-' + i);
    if (inp) { inp.focus(); inp.select(); }
  });

  // Build plain text & preview
  buildOutput(pair, finalTPs, entry, sl, rr, isL);
}

function toggleEdit(i) {
  if (editingIdx.has(i)) {
    editingIdx.delete(i);
  } else {
    editingIdx.add(i);
  }
  gen();
}

function onManualInput(i) {
  const inp = document.getElementById('tpm-' + i);
  manualTP[i] = inp ? inp.value : '';
  // Rebuild output without re-rendering DOM (preserve focus)
  rebuildOutput();
  // Update item class and display
  updateItemVisual(i);
  // Update reset-all button
  const resetAllBtn = document.getElementById('reset-all-btn');
  if (resetAllBtn) resetAllBtn.className = hasAnyManual() ? 'reset-all-btn visible' : 'reset-all-btn hidden';
}

function onManualKey(e, i) {
  if (e.key === 'Enter') toggleEdit(i);
  if (e.key === 'Escape') { resetManual(i); toggleEdit(i); }
}

function resetManual(i) {
  manualTP[i] = null;
  const inp = document.getElementById('tpm-' + i);
  if (inp) inp.value = '';
  gen();
}

function resetAllManual() {
  manualTP = {};
  editingIdx.clear();
  gen();
}

function updateItemVisual(i) {
  const item  = document.getElementById('tpi-' + i);
  const priceEl = item ? item.querySelector('.tp-price') : null;
  if (!item || !priceEl) return;

  const m = manualTP[i];
  const isManual = m !== null && m !== undefined && m !== '' && !isNaN(parseFloat(m));
  const dispVal = isManual ? parseFloat(m) : autoTP[i];

  item.classList.toggle('manual', isManual);
  priceEl.textContent = '$' + fmt(dispVal);

  // Update sub label
  const sub = item.querySelector('.tp-sub');
  if (sub) {
    sub.innerHTML = isManual
      ? `<span class="manual-tag">MANUAL</span>`
      : `<span style="color:var(--text3);font-size:11px">Auto · 1:${i+1}</span>`;
  }
}

function rebuildOutput() {
  const pair  = (document.getElementById('pair').value || '').trim().toUpperCase();
  const entry = parseFloat(document.getElementById('entry').value);
  const sl    = parseFloat(document.getElementById('sl').value);
  const rrRaw = parseFloat(document.getElementById('rr').value);
  const rr    = isNaN(rrRaw) || rrRaw < 1 ? 1 : Math.round(rrRaw);
  if (!pair || isNaN(entry) || isNaN(sl) || autoTP.length === 0) return;

  const isL = D === 'long';
  const finalTPs = autoTP.map((v, i) => {
    const m = manualTP[i];
    return (m !== null && m !== undefined && m !== '' && !isNaN(parseFloat(m))) ? parseFloat(m) : v;
  });
  buildOutput(pair, finalTPs, entry, sl, rr, isL);
}

function buildOutput(pair, finalTPs, entry, sl, rr, isL) {
  const sep    = '____________________________________';
  const dirEmoji = isL ? '🟢' : '🔴';
  const dirText  = D.toUpperCase();
  const desc   = (document.getElementById('desc').value || '').trim();
  const tpLines = finalTPs.map((tp, i) => `🔶TP${i+1}: $${fmt(tp)}`).join('\n');
  const descLine = desc ? `\n\n${desc}` : '';
  PT = `${sep}\n$${pair} ${dirEmoji}${dirText} RR 1:${rr}\n\n📍Entry: $${fmt(entry)}\n❌SL: $${fmt(sl)}\n${tpLines}${descLine}\n${sep}`;

  // Colored preview
  const tpC = finalTPs.map((tp, i) => {
    const isManual = manualTP[i] !== null && manualTP[i] !== undefined && manualTP[i] !== '' && !isNaN(parseFloat(manualTP[i]));
    const cls = isManual ? 'cv' : 'ca';
    return `<span class="${cls}">🔶TP${i+1}: $${fmt(tp)}</span>`;
  }).join('\n');

  const descPreview = desc
    ? `\n<span class="cm">${desc}</span>`
    : '';

  document.getElementById('pv').innerHTML =
    `<span class="cm">${sep}</span>\n` +
    `<span class="cw">$${pair}</span> ${dirEmoji}<span class="${isL?'cg':'cr'}">${dirText}</span> <span class="cm">RR</span> <span class="ca">1:${rr}</span>\n\n` +
    `<span class="cm">📍Entry:</span> <span class="cw">$${fmt(entry)}</span>\n` +
    `<span class="cm">❌SL:   </span> <span class="cr">$${fmt(sl)}</span>\n` +
    `${tpC}` +
    `\n${descPreview}\n` +
    `<span class="cm">${sep}</span>`;
}

function doCopy() {
  if (!PT) return;
  const btn   = document.getElementById('copybtn');
  const lbl   = document.getElementById('clbl');
  const toast = document.getElementById('toast');
  const ok = () => {
    btn.classList.add('ok'); lbl.textContent = 'Tersalin!';
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
      btn.classList.remove('ok');
      lbl.textContent = 'Salin Signal ke Clipboard';
    }, 2500);
  };
  if (navigator.clipboard) { navigator.clipboard.writeText(PT).then(ok).catch(fb); } else { fb(); }
  function fb() {
    const t = document.createElement('textarea'); t.value = PT;
    t.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); ok();
  }
}

gen();
</script>
</body>
</html>
