<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Formatter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b0e;--bg2:#111318;--bg3:#181b22;--bg4:#1e2229;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.13);
  --text:#ffffff;--text2:#fff700;--text3:#777777;
  --green:#4ade80;--green-bg:rgba(74,222,128,0.08);--green-br:rgba(74,222,128,0.2);
  --red:#f87171;--red-bg:rgba(248,113,113,0.08);--red-br:rgba(248,113,113,0.2);
  --gold:#fbbf24;--gold-bg:rgba(251,191,36,0.07);--gold-br:rgba(251,191,36,0.18);
  --violet:#a78bfa;--violet-bg:rgba(167,139,250,0.08);--violet-br:rgba(167,139,250,0.2);
  --blue:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:36px 20px 60px;
}
body::before{
  content:'';position:fixed;top:-180px;left:50%;transform:translateX(-50%);
  width:900px;height:500px;
  background:radial-gradient(ellipse,rgba(74,222,128,0.03) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}
.app{width:100%;max-width:1120px;position:relative;z-index:1}

/* Header */
.hdr{text-align:center;margin-bottom:30px}
.hdr-logo{display:inline-flex;align-items:center;gap:11px;margin-bottom:7px}
.hdr-icon{
  width:36px;height:36px;background:var(--green-bg);
  border:1px solid var(--green-br);border-radius:11px;
  display:flex;align-items:center;justify-content:center;
}
.hdr h1{font-size:20px;font-weight:600;letter-spacing:-0.4px}
.hdr p{font-size:13px;color:var(--text3);line-height:1.6}

/* 2-col layout */
.layout{display:flex;gap:14px;align-items:flex-start}
.left-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}
.right-col{width:360px;flex-shrink:0;position:sticky;top:36px;display:flex;flex-direction:column;gap:10px}

/* Card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:20px 20px 22px}
.card-label{font-size:10.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);margin-bottom:16px}

/* Field */
.field{flex:1}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'DM Mono',monospace;font-size:14px;font-weight:500;
  padding:10px 13px;outline:none;transition:border-color .18s,background .18s;
  -moz-appearance:textfield;
}
.field input::-webkit-inner-spin-button{-webkit-appearance:none}
.field input::placeholder{color:var(--text3);font-weight:400}
.field input:hover{border-color:var(--border-h)}
.field input:focus{border-color:rgba(255,255,255,.2);background:var(--bg4)}

.row{display:flex;gap:9px;margin-bottom:9px}
.row:last-child{margin-bottom:0}

/* Order type 3x2 grid */
.otype-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:4px;
}
.ot-btn{
  padding:8px 0;border-radius:7px;border:none;background:transparent;
  color:var(--text3);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .18s;letter-spacing:.1px;
}
.ot-btn.ml.on,.ot-btn.ll.on,.ot-btn.sl.on{background:var(--green-bg);color:var(--green);box-shadow:inset 0 0 0 1px var(--green-br)}
.ot-btn.ms.on,.ot-btn.ls.on,.ot-btn.ss.on{background:var(--red-bg);color:var(--red);box-shadow:inset 0 0 0 1px var(--red-br)}
.ot-btn:not(.on):hover{color:var(--text2)}

/* Confidence toggle */
.conf-wrap{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:3px;gap:3px}
.conf-btn{
  flex:1;padding:7px 0;border-radius:8px;border:none;background:transparent;
  color:var(--text3);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.conf-btn.high.on{background:rgba(74,222,128,0.12);color:var(--green);box-shadow:inset 0 0 0 1px var(--green-br)}
.conf-btn.medium.on{background:rgba(251,191,36,0.1);color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold-br)}
.conf-btn.low.on{background:rgba(248,113,113,0.1);color:var(--red);box-shadow:inset 0 0 0 1px var(--red-br)}
.conf-btn.none.on{background:var(--bg4);color:var(--text3);box-shadow:inset 0 0 0 1px var(--border-h)}
.conf-btn:not(.on):hover{color:var(--text2)}

/* Paste button on inputs */
.inp-wrap{position:relative}
.inp-wrap input{padding-right:36px}
.paste-btn{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;border-radius:6px;border:none;
  background:transparent;color:var(--text3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;padding:0;flex-shrink:0;
}
.paste-btn:hover{color:var(--text2);background:var(--bg4)}
.paste-btn.ok{color:var(--green)}

/* RR */
.rr-wrap{position:relative}
.rr-wrap input{padding-right:44px}
.rr-sfx{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);pointer-events:none;
}

/* Warn */
.warn{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--red);margin-top:9px;opacity:.85}

/* Risk pills */
.pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);font-size:11.5px;color:var(--text2)}
.pill b{font-weight:500;font-family:'DM Mono',monospace}
.pill.g b{color:var(--green)}.pill.r b{color:var(--red)}.pill.a b{color:var(--gold)}
.pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5}

/* TP header */
.tp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.tp-header .card-label{margin-bottom:0}
.reset-all-btn{
  display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;
  border:1px solid var(--border);background:transparent;
  color:var(--text3);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;
}
.reset-all-btn:hover{border-color:var(--border-h);color:var(--text2)}
.reset-all-btn.visible{display:flex}
.reset-all-btn.hidden{display:none}

/* TP list */
.tp-empty{text-align:center;color:var(--text3);font-size:13px;padding:16px 0 4px}
.tp-list{display:flex;flex-direction:column;gap:6px}
.tp-item{
  display:flex;align-items:center;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;transition:border-color .15s;
  animation:tp-in .22s ease both;overflow:hidden;
}
.tp-item.manual{border-color:var(--violet-br)}
.tp-item:not(.manual):hover{border-color:var(--gold-br)}
@keyframes tp-in{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.tp-left{display:flex;align-items:center;gap:10px;padding:10px 12px;flex:1;min-width:0}
.tp-badge{
  width:26px;height:26px;flex-shrink:0;border-radius:7px;
  background:var(--gold-bg);border:1px solid var(--gold-br);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:var(--gold);
  transition:background .2s,border-color .2s,color .2s;
}
.tp-item.manual .tp-badge{background:var(--violet-bg);border-color:var(--violet-br);color:var(--violet)}
.tp-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
.tp-name{font-size:12.5px;color:var(--text2);white-space:nowrap}
.tp-sub{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.manual-tag{
  font-size:10px;font-weight:600;letter-spacing:.5px;
  color:var(--violet);background:var(--violet-bg);
  border:1px solid var(--violet-br);padding:1px 6px;border-radius:4px;
}
.tp-right{display:flex;align-items:center;gap:8px;padding:10px 6px 10px 0;flex-shrink:0}
.tp-price{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--gold);transition:color .2s}
.tp-item.manual .tp-price{color:var(--violet)}
.tp-sep{width:1px;height:26px;background:var(--border);flex-shrink:0}
.tp-edit-btn{
  width:30px;height:30px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text3);transition:all .15s;flex-shrink:0;margin-right:8px;
}
.tp-edit-btn:hover{border-color:var(--border-h);color:var(--text2);background:var(--bg4)}
.tp-edit-btn.editing{border-color:var(--violet-br);color:var(--violet);background:var(--violet-bg)}
.tp-input-wrap{display:none;align-items:center;gap:6px;padding:7px 8px 7px 0;flex-shrink:0}
.tp-input-wrap.visible{display:flex}
.tp-manual-input{
  width:110px;background:var(--bg4);border:1px solid var(--violet-br);border-radius:8px;
  color:var(--violet);font-family:'DM Mono',monospace;font-size:14px;font-weight:500;
  padding:7px 10px;outline:none;transition:border-color .15s,box-shadow .15s;
  -moz-appearance:textfield;
}
.tp-manual-input::-webkit-inner-spin-button{-webkit-appearance:none}
.tp-manual-input:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(167,139,250,0.1)}
.tp-reset-btn{
  width:27px;height:27px;border-radius:7px;
  border:1px solid var(--border);background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text3);transition:all .15s;flex-shrink:0;
}
.tp-reset-btn:hover{border-color:var(--red-br);color:var(--red);background:var(--red-bg)}

/* Description textarea */
.field textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;
  padding:10px 13px;outline:none;resize:vertical;min-height:76px;line-height:1.6;
  transition:border-color .18s,background .18s;
}
.field textarea::placeholder{color:var(--text3)}
.field textarea:hover{border-color:var(--border-h)}
.field textarea:focus{border-color:rgba(255,255,255,.2);background:var(--bg4)}

/* Preview */
.pv-shell{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.pv-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border)}
.pv-dots{display:flex;gap:5px}
.pv-dots span{width:7px;height:7px;border-radius:50%;background:var(--border-h)}
.pv-tag{font-size:10px;color:var(--text3);letter-spacing:.9px;text-transform:uppercase}
.pv-body{
  padding:14px 16px;font-family:'DM Mono',monospace;
  font-size:12.5px;line-height:1.9;white-space:pre;overflow-x:auto;
  color:var(--text2);min-height:72px;
}
.cg{color:var(--green)}.cr{color:var(--red)}.ca{color:var(--gold)}
.cm{color:var(--text3)}.cw{color:var(--text);font-weight:500}.cv{color:var(--violet)}

/* Copy btn */
.copy{
  width:100%;padding:13px;border-radius:12px;
  border:1px solid var(--green-br);background:var(--green-bg);
  color:var(--green);font-family:'DM Sans',sans-serif;
  font-weight:600;font-size:14px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;
}
.copy:hover{background:rgba(74,222,128,.13);border-color:rgba(74,222,128,.32)}
.copy:active{transform:scale(.99)}
.copy.ok{background:rgba(74,222,128,.14)}

/* Toast */
.toast{
  position:fixed;bottom:32px;left:50%;
  transform:translateX(-50%) translateY(56px);
  background:#fff;color:#111;
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;
  padding:10px 22px;border-radius:100px;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .35s;
  opacity:0;z-index:999;display:flex;align-items:center;gap:8px;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.t-ck{
  width:17px;height:17px;border-radius:50%;background:#22c55e;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hdr-logo">
      <div class="hdr-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <polyline points="2,13 5.5,8 8.5,11 12,5 16,8" stroke="#4ade80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="8" r="1.5" fill="#4ade80"/>
        </svg>
      </div>
      <h1>Signal Formatter</h1>
    </div>
    <p>Isi posisi, sinyal langsung siap di-paste</p>
  </div>

  <div class="layout">

    <!-- ══ LEFT: input ══ -->
    <div class="left-col">
      <div class="card">
        <div class="card-label">Detail Posisi</div>

        <!-- Pair -->
        <div class="row">
          <div class="field">
            <label>Pair</label>
            <input id="pair" type="text" placeholder="BTC/USDT" oninput="gen()" autocomplete="off"/>
          </div>
        </div>

        <!-- Order type -->
        <div class="row">
          <div class="field">
            <label>Tipe Order</label>
            <div class="otype-grid">
              <button class="ot-btn ml on" id="ot-ml" onclick="setOrder('market_long')">🟢 Market Long</button>
              <button class="ot-btn ll"    id="ot-ll" onclick="setOrder('limit_long')">🟢 Limit Long</button>
              <button class="ot-btn sl"    id="ot-sl" onclick="setOrder('stop_long')">🟢 Stop Long</button>
              <button class="ot-btn ms"    id="ot-ms" onclick="setOrder('market_sell')">🔴 Market Sell</button>
              <button class="ot-btn ls"    id="ot-ls" onclick="setOrder('limit_sell')">🔴 Limit Sell</button>
              <button class="ot-btn ss"    id="ot-ss" onclick="setOrder('stop_sell')">🔴 Stop Sell</button>
            </div>
          </div>
        </div>

        <!-- Confidence -->
        <div class="row">
          <div class="field">
            <label>Confidence</label>
            <div class="conf-wrap">
              <button class="conf-btn high"    id="ch"  onclick="setConf('high')">🔥 HIGH</button>
              <button class="conf-btn medium"  id="cm_" onclick="setConf('medium')">⚡ MEDIUM</button>
              <button class="conf-btn low"     id="cl"  onclick="setConf('low')">🌀 LOW</button>
              <button class="conf-btn none on" id="cn"  onclick="setConf('none')">— None</button>
            </div>
          </div>
        </div>

        <!-- Entry / SL / RR -->
        <div class="row">
          <div class="field">
            <label>Entry ($)</label>
            <div class="inp-wrap">
              <input id="entry" type="number" placeholder="100" oninput="gen()"/>
              <button class="paste-btn" id="pb-entry" onclick="pasteInto('entry')" title="Paste">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="9" rx="1.2" stroke="currentColor" stroke-width="1.3"/><path d="M4 4V3a1 1 0 011-1h4a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M2 6h2M2 9h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label>Stop Loss ($)</label>
            <div class="inp-wrap">
              <input id="sl" type="number" placeholder="90" oninput="gen()"/>
              <button class="paste-btn" id="pb-sl" onclick="pasteInto('sl')" title="Paste">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="9" rx="1.2" stroke="currentColor" stroke-width="1.3"/><path d="M4 4V3a1 1 0 011-1h4a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M2 6h2M2 9h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
              </button>
            </div>
          </div>
          <div class="field" style="flex:.65">
            <label>RR</label>
            <div class="rr-wrap">
              <input id="rr" type="number" value="2" min="1" max="20" oninput="gen()"/>
              <span class="rr-sfx">1:<span id="rrv">2</span></span>
            </div>
          </div>
        </div>

        <!-- Description -->
        <div class="row" style="margin-top:8px">
          <div class="field">
            <label>Deskripsi / Analisa</label>
            <textarea id="desc" placeholder="Contoh: BTC breakout dari resistance 100k, volume tinggi, momentum bullish..." oninput="gen()"></textarea>
          </div>
        </div>

        <div id="wa"></div>
      </div>

      <!-- TP card -->
      <div class="card">
        <div class="tp-header">
          <div class="card-label" style="margin-bottom:0">Take Profit Targets</div>
          <button class="reset-all-btn hidden" id="reset-all-btn" onclick="resetAllManual()">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
              <path d="M1 6a5 5 0 105-5 5 5 0 00-4.9 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <path d="M1 2v4h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Reset semua ke auto
          </button>
        </div>
        <div id="pills" class="pills" style="display:none"></div>
        <div id="tpl" class="tp-list"><div class="tp-empty">Isi Entry &amp; SL untuk melihat target TP</div></div>
      </div>
    </div><!-- /left-col -->

    <!-- ══ RIGHT: preview + copy ══ -->
    <div class="right-col">
      <div class="card">
        <div class="card-label">Preview Signal</div>
        <div class="pv-shell">
          <div class="pv-bar">
            <div class="pv-dots"><span></span><span></span><span></span></div>
            <span class="pv-tag">Output</span>
          </div>
          <div class="pv-body" id="pv"><span class="cm">Signal akan muncul di sini…</span></div>
        </div>
      </div>

      <button class="copy" id="copybtn" onclick="doCopy()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <span id="clbl">Salin Signal ke Clipboard</span>
      </button>
    </div><!-- /right-col -->

  </div><!-- /layout -->
</div>

<div class="toast" id="toast">
  <div class="t-ck">
    <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
      <path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  Signal tersalin!
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let ORDER = 'market_long';
let CONF  = 'none';
let PT    = '';
let manualTP   = {};
let autoTP     = [];
let editingIdx = new Set();

const ORDER_META = {
  market_long: { label:'MARKET LONG', emoji:'🟢', isLong:true  },
  market_sell: { label:'MARKET SELL', emoji:'🔴', isLong:false },
  limit_long:  { label:'LIMIT LONG',  emoji:'🟢', isLong:true  },
  limit_sell:  { label:'LIMIT SELL',  emoji:'🔴', isLong:false },
  stop_long:   { label:'STOP LONG',   emoji:'🟢', isLong:true  },
  stop_sell:   { label:'STOP SELL',   emoji:'🔴', isLong:false },
};

const PENCIL_SVG = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M9.5 1.5l2 2-8 8H1.5v-2l8-8z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const CLOSE_SVG  = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2L2 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`;
const RESET_SVG  = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6a5 5 0 105-5 5 5 0 00-4.9 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M1 2v4h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

// ── Paste helper ──────────────────────────────────────────────
async function pasteInto(id) {
  const inp = document.getElementById(id);
  const btn = document.getElementById('pb-' + id);
  if (!inp || !btn) return;
  try {
    const text = await navigator.clipboard.readText();
    const num  = text.trim().replace(/[^0-9.]/g, '');
    if (num && !isNaN(parseFloat(num))) {
      inp.value = num;
      gen();
      btn.classList.add('ok');
      setTimeout(() => btn.classList.remove('ok'), 800);
    }
  } catch {
    // Fallback: focus the field so user can paste manually
    inp.focus();
    inp.select();
  }
}

// ── Setters ────────────────────────────────────────────────────
function setOrder(o) {
  ORDER = o;
  const idMap = { market_long:'ml', market_sell:'ms', limit_long:'ll', limit_sell:'ls', stop_long:'sl', stop_sell:'ss' };
  Object.entries(idMap).forEach(([key, cls]) => {
    const el = document.getElementById('ot-' + cls);
    if (!el) return;
    el.className = 'ot-btn ' + cls + (key === o ? ' on' : '');
  });
  manualTP = {};
  editingIdx.clear();
  gen();
}

function setConf(c) {
  CONF = c;
  ['high','medium','low','none'].forEach(k => {
    const id = k === 'medium' ? 'cm_' : 'c' + k[0];
    const el = document.getElementById(id);
    if (el) el.className = 'conf-btn ' + k + (k === c ? ' on' : '');
  });
  gen();
}

// ── Helpers ────────────────────────────────────────────────────
function fmt(n) {
  if (isNaN(n)) return '—';
  return parseFloat(n.toFixed(10)).toString();
}
function hasAnyManual() {
  return Object.values(manualTP).some(v => v !== null && v !== undefined && v !== '' && !isNaN(parseFloat(v)));
}

// ── Main gen ───────────────────────────────────────────────────
function gen() {
  const pair  = (document.getElementById('pair').value || '').trim().toUpperCase();
  const entry = parseFloat(document.getElementById('entry').value);
  const sl    = parseFloat(document.getElementById('sl').value);
  const rrRaw = parseFloat(document.getElementById('rr').value);
  const rr    = isNaN(rrRaw) || rrRaw < 1 ? 1 : Math.round(rrRaw);

  document.getElementById('rrv').textContent = isNaN(rrRaw) ? '—' : rr;

  const wa    = document.getElementById('wa');
  const tpl   = document.getElementById('tpl');
  const pills = document.getElementById('pills');
  const resetAllBtn = document.getElementById('reset-all-btn');
  const meta  = ORDER_META[ORDER];
  const isL   = meta.isLong;

  if (!pair || isNaN(entry) || isNaN(sl)) {
    tpl.innerHTML = '<div class="tp-empty">Isi Entry &amp; SL untuk melihat target TP</div>';
    pills.style.display = 'none';
    document.getElementById('pv').innerHTML = '<span class="cm">Signal akan muncul di sini…</span>';
    wa.innerHTML = '';
    PT = '';
    return;
  }

  const slOk = isL ? sl < entry : sl > entry;
  wa.innerHTML = slOk ? '' :
    `<div class="warn">
       <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
         <path d="M7 5v3M7 9.5v.5M2.5 12h9a1 1 0 00.87-1.5l-4.5-7.8a1 1 0 00-1.74 0l-4.5 7.8A1 1 0 002.5 12z"
               stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
       </svg>
       SL ${isL ? 'harus di bawah' : 'harus di atas'} Entry
     </div>`;

  if (!slOk) {
    tpl.innerHTML = '<div class="tp-empty">Perbaiki Entry &amp; SL terlebih dahulu</div>';
    pills.style.display = 'none';
    PT = '';
    return;
  }

  const risk = Math.abs(entry - sl);

  autoTP = [];
  for (let i = 1; i <= rr; i++) {
    autoTP.push(isL ? entry + risk * i : entry - risk * i);
  }

  const finalTPs = autoTP.map((v, i) => {
    const m = manualTP[i];
    return (m !== null && m !== undefined && m !== '' && !isNaN(parseFloat(m))) ? parseFloat(m) : v;
  });

  const pct = ((risk / entry) * 100).toFixed(2);
  pills.style.display = 'flex';
  pills.innerHTML =
    `<div class="pill ${isL?'g':'r'}"><div class="pill-dot"></div>${meta.label} <b>${meta.emoji}</b></div>
     <div class="pill r"><div class="pill-dot"></div>SL <b>${pct}%</b> dari entry</div>
     <div class="pill a"><div class="pill-dot"></div>Target <b>${rr} TP</b></div>`;

  resetAllBtn.className = hasAnyManual() ? 'reset-all-btn visible' : 'reset-all-btn hidden';

  tpl.innerHTML = autoTP.map((auto, i) => {
    const isManual  = manualTP[i] !== null && manualTP[i] !== undefined && manualTP[i] !== '' && !isNaN(parseFloat(manualTP[i]));
    const isEditing = editingIdx.has(i);
    const dispVal   = isManual ? parseFloat(manualTP[i]) : auto;
    const manualVal = manualTP[i] !== undefined && manualTP[i] !== null ? manualTP[i] : '';
    return `
    <div class="tp-item${isManual?' manual':''}" id="tpi-${i}">
      <div class="tp-left">
        <div class="tp-badge">${i+1}</div>
        <div class="tp-meta">
          <span class="tp-name">Take Profit ${i+1}</span>
          <div class="tp-sub">
            ${isManual
              ? `<span class="manual-tag">MANUAL</span>`
              : `<span style="color:var(--text3);font-size:11px">Auto · 1:${i+1}</span>`}
          </div>
        </div>
      </div>
      <div class="tp-right" id="tpr-${i}" style="${isEditing?'display:none':''}">
        <span class="tp-price">$${fmt(dispVal)}</span>
        <div class="tp-sep"></div>
        <button class="tp-edit-btn${isEditing?' editing':''}" onclick="toggleEdit(${i})" title="Edit manual">${PENCIL_SVG}</button>
      </div>
      <div class="tp-input-wrap${isEditing?' visible':''}" id="tpe-${i}">
        <input class="tp-manual-input" id="tpm-${i}" type="number"
          placeholder="${fmt(auto)}" value="${manualVal}"
          oninput="onManualInput(${i})" onkeydown="onManualKey(event,${i})"/>
        <button class="tp-reset-btn" onclick="resetManual(${i})" title="Reset ke auto">${RESET_SVG}</button>
        <button class="tp-edit-btn editing" onclick="toggleEdit(${i})" title="Selesai">${CLOSE_SVG}</button>
      </div>
    </div>`;
  }).join('');

  editingIdx.forEach(i => {
    const inp = document.getElementById('tpm-' + i);
    if (inp) { inp.focus(); inp.select(); }
  });

  buildOutput(pair, finalTPs, entry, sl, rr, isL);
}

// ── TP editing ────────────────────────────────────────────────
function toggleEdit(i) {
  editingIdx.has(i) ? editingIdx.delete(i) : editingIdx.add(i);
  gen();
}
function onManualInput(i) {
  const inp = document.getElementById('tpm-' + i);
  manualTP[i] = inp ? inp.value : '';
  rebuildOutput();
  updateItemVisual(i);
  const r = document.getElementById('reset-all-btn');
  if (r) r.className = hasAnyManual() ? 'reset-all-btn visible' : 'reset-all-btn hidden';
}
function onManualKey(e, i) {
  if (e.key === 'Enter')  toggleEdit(i);
  if (e.key === 'Escape') { resetManual(i); toggleEdit(i); }
}
function resetManual(i) {
  manualTP[i] = null;
  const inp = document.getElementById('tpm-' + i);
  if (inp) inp.value = '';
  gen();
}
function resetAllManual() {
  manualTP = {};
  editingIdx.clear();
  gen();
}
function updateItemVisual(i) {
  const item    = document.getElementById('tpi-' + i);
  const priceEl = item ? item.querySelector('.tp-price') : null;
  if (!item || !priceEl) return;
  const m = manualTP[i];
  const isManual = m !== null && m !== undefined && m !== '' && !isNaN(parseFloat(m));
  item.classList.toggle('manual', isManual);
  priceEl.textContent = '$' + fmt(isManual ? parseFloat(m) : autoTP[i]);
  const sub = item.querySelector('.tp-sub');
  if (sub) sub.innerHTML = isManual
    ? `<span class="manual-tag">MANUAL</span>`
    : `<span style="color:var(--text3);font-size:11px">Auto · 1:${i+1}</span>`;
}
function rebuildOutput() {
  const pair  = (document.getElementById('pair').value || '').trim().toUpperCase();
  const entry = parseFloat(document.getElementById('entry').value);
  const sl    = parseFloat(document.getElementById('sl').value);
  const rrRaw = parseFloat(document.getElementById('rr').value);
  const rr    = isNaN(rrRaw) || rrRaw < 1 ? 1 : Math.round(rrRaw);
  if (!pair || isNaN(entry) || isNaN(sl) || autoTP.length === 0) return;
  const isL = ORDER_META[ORDER].isLong;
  const finalTPs = autoTP.map((v, i) => {
    const m = manualTP[i];
    return (m !== null && m !== undefined && m !== '' && !isNaN(parseFloat(m))) ? parseFloat(m) : v;
  });
  buildOutput(pair, finalTPs, entry, sl, rr, isL);
}

// ── Build output ──────────────────────────────────────────────
function buildOutput(pair, finalTPs, entry, sl, rr, isL) {
  const sep  = '____________________________________';
  const meta = ORDER_META[ORDER];
  const desc = (document.getElementById('desc').value || '').trim();

  const confMap  = { high:'🔥 Confidence: HIGH', medium:'⚡ Confidence: MEDIUM', low:'🌀 Confidence: LOW' };
  const confLine = confMap[CONF] ? `\n${confMap[CONF]}\n` : '';

  const tpLines  = finalTPs.map((tp, i) => `🔶TP${i+1}: $${fmt(tp)}`).join('\n');
  const descLine = desc ? `\n\n${desc}` : '';

  PT = `${sep}\n$${pair} ${meta.emoji} ${meta.label}  RR 1:${rr}\n${confLine}\n📍Entry: $${fmt(entry)}\n❌SL: $${fmt(sl)}\n\n${tpLines}${descLine}\n${sep}`;

  // Colored preview
  const tpC = finalTPs.map((tp, i) => {
    const isM = manualTP[i] !== null && manualTP[i] !== undefined && manualTP[i] !== '' && !isNaN(parseFloat(manualTP[i]));
    return `<span class="${isM?'cv':'ca'}">🔶TP${i+1}: $${fmt(tp)}</span>`;
  }).join('\n');

  const confColorMap = { high:'cg', medium:'ca', low:'cr' };
  const confPreview  = confMap[CONF]
    ? `\n<span class="${confColorMap[CONF]}">${confMap[CONF]}</span>\n`
    : '';

  const descPreview = desc ? `\n<span class="cm">${desc}</span>` : '';
  const dirCls = isL ? 'cg' : 'cr';

  document.getElementById('pv').innerHTML =
    `<span class="cm">${sep}</span>\n` +
    `<span class="cw">$${pair}</span> <span class="${dirCls}">${meta.emoji} ${meta.label}</span>  <span class="cm">RR</span> <span class="ca">1:${rr}</span>\n` +
    confPreview +
    `\n<span class="cm">📍Entry:</span> <span class="cw">$${fmt(entry)}</span>\n` +
    `<span class="cm">❌SL:   </span> <span class="cr">$${fmt(sl)}</span>\n` +
    `\n${tpC}` +
    descPreview + '\n' +
    `<span class="cm">${sep}</span>`;
}

// ── Copy ──────────────────────────────────────────────────────
function doCopy() {
  if (!PT) return;
  const btn   = document.getElementById('copybtn');
  const lbl   = document.getElementById('clbl');
  const toast = document.getElementById('toast');
  const ok = () => {
    btn.classList.add('ok'); lbl.textContent = 'Tersalin!';
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
      btn.classList.remove('ok');
      lbl.textContent = 'Salin Signal ke Clipboard';
    }, 2500);
  };
  if (navigator.clipboard) { navigator.clipboard.writeText(PT).then(ok).catch(fb); } else { fb(); }
  function fb() {
    const t = document.createElement('textarea'); t.value = PT;
    t.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); ok();
  }
}

gen();
</script>
